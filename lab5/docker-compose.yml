services:
  # Контейнер с Nginx и web-приложением на Flask.
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web_server
    depends_on:
      # Очередность запуска: web стартует только после того,
      # как PostgreSQL пройдет healthcheck.
      new_db:
        condition: service_healthy
    ports:
      # Nginx внутри контейнера слушает 80 порт.
      # На хостовой машине приложение доступно по http://localhost:8080
      - "8080:80"
    volumes:
      # Конфигурация Nginx передается в контейнер через volume bind mount.
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Конфигурация web-приложения передается через volume bind mount.
      - ./config/app.env:/app/config/app.env:ro
    networks:
      lab_net:
        ipv4_address: 10.10.10.2
    restart: unless-stopped

  # Контейнер с PostgreSQL.
  # Имя сервиса new_db автоматически становится DNS-именем внутри docker network.
  new_db:
    image: postgres:16-alpine
    container_name: new_db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: app_password
    volumes:
      # Docker volume для постоянного хранения данных PostgreSQL.
      - pg_data:/var/lib/postgresql/data
    networks:
      lab_net:
        ipv4_address: 10.10.10.3
        aliases:
          # Второе DNS-имя, по которому БД доступна из web-контейнера.
          - dev_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

# Одна bridge-сеть с подсетью 10.10.10.0/28.
networks:
  lab_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/28

# Docker volume описан в этом же docker-compose.yml.
volumes:
  pg_data:
