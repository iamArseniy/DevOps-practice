---
- name: Setup user with sudo, ssh key auth and /opt directory
  hosts: target_servers
  become: true

  vars:
    sudo_group: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"
    ssh_service_name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"

  tasks:
    - name: Install required packages
      ansible.builtin.package:
        name:
          - sudo
          - openssh-server
          - acl
        state: present

    - name: Create user
      ansible.builtin.user:
        name: "{{ created_user }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Add user to sudo group
      ansible.builtin.user:
        name: "{{ created_user }}"
        groups: "{{ sudo_group }}"
        append: true

    - name: Allow sudo without password for created user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ created_user }}"
        content: "{{ created_user }} ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Create .ssh directory for user
      ansible.builtin.file:
        path: "/home/{{ created_user }}/.ssh"
        state: directory
        owner: "{{ created_user }}"
        group: "{{ created_user }}"
        mode: "0700"

    - name: Add public key to authorized_keys
      ansible.builtin.authorized_key:
        user: "{{ created_user }}"
        key: "{{ lookup('file', public_key_path) }}"
        state: present

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?\s*PasswordAuthentication\s+'
        line: 'PasswordAuthentication no'
        backup: true
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Disable keyboard-interactive SSH authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?\s*KbdInteractiveAuthentication\s+'
        line: 'KbdInteractiveAuthentication no'
        backup: true
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

    - name: Create directory in /opt for user
      ansible.builtin.file:
        path: "{{ workdir_path }}"
        state: directory
        owner: "{{ created_user }}"
        group: "{{ created_user }}"
        mode: "0660"

  handlers:
    - name: Restart ssh
      ansible.builtin.service:
        name: "{{ ssh_service_name }}"
        state: restarted
