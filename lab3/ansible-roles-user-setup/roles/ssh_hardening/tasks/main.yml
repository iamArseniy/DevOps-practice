---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Install openssh-server
  ansible.builtin.package:
    name: openssh-server
    state: present

- name: Create privilege separation directory for sshd
  ansible.builtin.file:
    path: /run/sshd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PasswordAuthentication\s+'
    line: "PasswordAuthentication {{ ssh_password_authentication }}"
    backup: true
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart ssh

- name: Disable keyboard-interactive SSH authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*KbdInteractiveAuthentication\s+'
    line: "KbdInteractiveAuthentication {{ ssh_kbd_interactive_authentication }}"
    backup: true
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart ssh